# ========================================
# GXS Bank — Application Configuration
# ========================================

spring.application.name=gxs-bank

# ---- Server ----
server.port=8080

# ---- PostgreSQL ----
spring.datasource.url=jdbc:postgresql://localhost:5432/gxs_bank
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ---- JWT ----
app.jwt.secret=GxsBankSuperSecretKeyForJWT2026ThatIsLongEnoughForHS512Algorithm!!
app.jwt.expiration-ms=86400000

# ---- CORS ----
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ---- Logging ----
logging.level.com.gxs.bank=DEBUG
logging.level.org.springframework.security=INFO
