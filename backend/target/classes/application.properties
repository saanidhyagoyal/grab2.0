# ========================================
# GXS Bank — Application Configuration
# ========================================

spring.application.name=gxs-bank

# ---- Server ----
server.port=8080

# ---- PostgreSQL ----
spring.datasource.url=jdbc:h2:mem:gxs_bank;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# ---- JWT ----
app.jwt.secret=GxsBankSuperSecretKeyForJWT2026ThatIsLongEnoughForHS512Algorithm!!
app.jwt.expiration-ms=86400000

# ---- CORS ----
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ---- Logging ----
logging.level.com.gxs.bank=DEBUG
logging.level.org.springframework.security=INFO
